<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>햄쥐 작업 목록</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: #F5F1E6;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 2rem;
            color: #3E2723;
            font-size: 28px;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 2rem;
            align-items: start;
        }
        .calendar-card {
            background: white;
            border: 1px solid #E8E3DB;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px rgba(62, 39, 35, 0.08);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .calendar-header button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #F4C9D6;
            padding: 4px 8px;
            font-weight: bold;
        }
        .calendar-header button:hover {
            color: #F9A8BB;
        }
        .calendar-month {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #3E2723;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            font-size: 11px;
            margin-bottom: 1.5rem;
        }
        .calendar-day-header {
            text-align: center;
            color: #999;
            font-weight: 500;
            padding: 4px 0;
        }
        .calendar-day {
            text-align: center;
            padding: 6px 2px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            transition: all 0.2s;
        }
        .calendar-day:hover {
            background: #F5F1E6;
        }
        .calendar-day.has-deadline {
            background: #F4C9D6;
            color: #3E2723;
            font-weight: 600;
        }
        .selected-date-info {
            background: #F5F1E6;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }
        .selected-date-info h4 {
            font-size: 12px;
            color: #3E2723;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .date-people {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        .date-people .person-tag {
            display: inline-block;
            background: #F4C9D6;
            color: #3E2723;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .kanban-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        .kanban-column {
            background: white;
            border: 1px solid #E8E3DB;
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 500px;
            box-shadow: 0 1px 3px rgba(62, 39, 35, 0.08);
        }
        .column-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid;
            color: #3E2723;
        }
        .column-header.inquiry {
            border-color: #F4C9D6;
            color: #F9A8BB;
        }
        .column-header.completed {
            border-color: #F9A8BB;
            color: #F9A8BB;
        }
        .column-header.inprogress {
            border-color: #F4C9D6;
            color: #F4C9D6;
        }
        .project-card {
            background: #FAFAF8;
            border: 1px solid #E8E3DB;
            border-radius: 8px;
            padding: 0.875rem;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.2s;
            draggable: true;
        }
        .project-card:active {
            cursor: grabbing;
        }
        .project-card:hover {
            border-color: #F4C9D6;
            box-shadow: 0 2px 6px rgba(244, 201, 214, 0.2);
            background: white;
        }
        .project-card.dragging {
            opacity: 0.5;
        }
        .project-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #3E2723;
        }
        .project-notes {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        .project-deadline {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .completed-section {
            margin-top: 2rem;
            background: white;
            border: 1px solid #E8E3DB;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(62, 39, 35, 0.08);
        }
        .completed-header {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: background 0.2s;
        }
        .completed-header:hover {
            background: #F5F1E6;
        }
        .completed-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: #F9A8BB;
            margin: 0;
            flex: 1;
        }
        .toggle-icon {
            display: inline-block;
            transition: transform 0.2s;
            color: #F4C9D6;
        }
        .toggle-icon.open {
            transform: rotate(180deg);
        }
        .completed-list {
            display: none;
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid #E8E3DB;
        }
        .completed-list.show {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            padding: 1.5rem;
        }
        .completed-card {
            background: #FAFAF8;
            border: 1px solid #E8E3DB;
            border-radius: 8px;
            padding: 12px;
            cursor: grab;
            text-align: center;
            transition: all 0.2s;
            font-weight: 600;
            color: #3E2723;
            font-size: 13px;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            draggable: true;
        }
        .completed-card:hover {
            border-color: #F4C9D6;
            background: white;
            box-shadow: 0 2px 6px rgba(244, 201, 214, 0.2);
        }
        .completed-card.dragging {
            opacity: 0.5;
        }
        .completed-list.drag-over {
            background: #F5F1E6;
            border-radius: 8px;
            padding: 1.5rem;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 2rem;
        }
        .add-button, .save-button, .settings-button {
            padding: 0.75rem 1.25rem;
            background: #F4C9D6;
            color: #3E2723;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .add-button:hover, .save-button:hover, .settings-button:hover {
            background: #F9A8BB;
        }
        .settings-button {
            background: #E8E3DB;
        }
        .settings-button:hover {
            background: #D4CFC4;
        }
        .sync-status {
            margin-top: 1rem;
            font-size: 12px;
            color: #F9A8BB;
            text-align: center;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(62, 39, 35, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 25px rgba(62, 39, 35, 0.2);
        }
        .modal h3 {
            margin-bottom: 1.5rem;
            font-size: 18px;
            color: #3E2723;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #3E2723;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #E8E3DB;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #FAFAF8;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #F4C9D6;
            background: white;
            box-shadow: 0 0 0 3px rgba(244, 201, 214, 0.2);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        .modal-buttons button {
            padding: 10px 16px;
            border: 1px solid #E8E3DB;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background: white;
            color: #3E2723;
            transition: all 0.2s;
        }
        .modal-buttons button:hover {
            background: #F5F1E6;
        }
        .modal-buttons .delete-btn {
            background: #F4C9D6;
            color: #3E2723;
            border-color: #F4C9D6;
            margin-right: auto;
        }
        .modal-buttons .delete-btn:hover {
            background: #F9A8BB;
        }
        .modal-buttons .save-btn {
            background: #F4C9D6;
            color: #3E2723;
            border-color: #F4C9D6;
        }
        .modal-buttons .save-btn:hover {
            background: #F9A8BB;
        }
        .kanban-column.drag-over {
            background: #F5F1E6;
            border-color: #F4C9D6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>햄쥐 작업 목록</h1>
        
        <div class="main-grid">
            <!-- 달력 -->
            <div class="calendar-card">
                <div class="calendar-header">
                    <button onclick="prevMonth()">◀</button>
                    <span class="calendar-month" id="monthDisplay"></span>
                    <button onclick="nextMonth()">▶</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="selected-date-info" id="selectedDateInfo" style="display: none;"></div>
            </div>

            <!-- 칸반보드 -->
            <div>
                <div class="kanban-section" id="kanbanSection"></div>
                
                <!-- 작업 완료 -->
                <div class="completed-section">
                    <div class="completed-header" onclick="toggleCompleted()">
                        <span class="toggle-icon" id="toggleIcon">▼</span>
                        <h3 id="completedCount">작업완료 (0)</h3>
                    </div>
                    <div class="completed-list" id="completedList"></div>
                </div>

                <div class="button-group">
                    <button class="add-button" onclick="openModal()">+ 새 프로젝트 추가</button>
                    <button class="save-button" onclick="saveToGitHub()">💾 GitHub에 저장</button>
                    <button class="settings-button" onclick="openSettings()">⚙️ 설정</button>
                </div>
                <div class="sync-status" id="syncStatus"></div>
            </div>
        </div>
    </div>

    <!-- 프로젝트 수정 모달 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="modalTitle">새 프로젝트 추가</h3>
            
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="inputName" placeholder="사람 이름을 입력하세요">
            </div>

            <div class="form-group">
                <label>상태</label>
                <select id="inputStatus">
                    <option>문의만</option>
                    <option>결제완료</option>
                    <option>진행중</option>
                    <option>작업완료</option>
                </select>
            </div>

            <div class="form-group">
                <label>메모</label>
                <textarea id="inputNotes" placeholder="진행 상황, 특별 요청사항 등을 입력하세요"></textarea>
            </div>

            <div class="form-group">
                <label>기한</label>
                <input type="date" id="inputDeadline">
            </div>

            <div class="modal-buttons">
                <button class="delete-btn" id="deleteBtn" onclick="deleteProject()" style="display:none;">삭제</button>
                <button onclick="closeModal()">취소</button>
                <button class="save-btn" onclick="saveProject()">저장</button>
            </div>
        </div>
    </div>

    <!-- 설정 모달 -->
    <div class="modal-overlay" id="settingsOverlay" onclick="closeSettings(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>GitHub 설정</h3>
            
            <div class="form-group">
                <label>GitHub Personal Access Token</label>
                <input type="password" id="tokenInput" placeholder="ghp_로 시작하는 토큰 입력">
                <small style="color: #999; margin-top: 4px; display: block;">토큰은 로컬에만 저장됩니다 (안전함)</small>
            </div>

            <div class="modal-buttons">
                <button onclick="closeSettings()">취소</button>
                <button class="save-btn" onclick="saveToken()">저장</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'hamg-web';
        const GITHUB_REPO = 'HamG-todo';
        const FILE_NAME = 'projects.json';

        let projects = [];
        let currentDate = new Date();
        let editingId = null;
        let completedOpen = false;

        // 초기화
        function init() {
            loadFromGitHub();
            renderCalendar();
            renderKanban();
        }

        // GitHub에서 데이터 로드
        async function loadFromGitHub() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_NAME}`,
                    { headers: { 'Accept': 'application/vnd.github.v3.raw' } }
                );
                
                if (response.ok) {
                    const text = await response.text();
                    if (text) {
                        projects = JSON.parse(text);
                    } else {
                        createSampleData();
                    }
                    renderCalendar();
                    renderKanban();
                    updateSyncStatus('✅ 동기화 완료', '#10b981');
                } else {
                    // 파일이 없으면 샘플 데이터 생성
                    createSampleData();
                    renderCalendar();
                    renderKanban();
                    updateSyncStatus('📝 새로운 저장소 생성됨', '#F9A8BB');
                }
            } catch (error) {
                console.error('로드 오류:', error);
                createSampleData();
                renderCalendar();
                renderKanban();
                updateSyncStatus('⚠️ 로컬에서 로드됨', '#F9A8BB');
            }
        }

        // GitHub에 데이터 저장
        async function saveToGitHub() {
            const token = localStorage.getItem('githubToken');
            
            if (!token) {
                alert('GitHub 토큰을 먼저 설정해주세요!');
                openSettings();
                return;
            }

            try {
                updateSyncStatus('⏳ 저장 중...', '#F4C9D6');

                // 파일의 SHA 가져오기
                let sha = null;
                try {
                    const checkResponse = await fetch(
                        `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_NAME}`,
                        { 
                            headers: { 
                                'Authorization': `token ${token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            } 
                        }
                    );
                    
                    if (checkResponse.ok) {
                        const fileData = await checkResponse.json();
                        sha = fileData.sha;
                    }
                } catch (e) {
                    console.log('파일 확인 실패 (새 파일로 생성됨):', e);
                }

                // 파일 업로드/업데이트
                const projectsJson = JSON.stringify(projects, null, 2);
                const base64 = btoa(unescape(encodeURIComponent(projectsJson)));
                
                const requestBody = {
                    message: `Update projects - ${new Date().toLocaleString('ko-KR')}`,
                    content: base64
                };

                // SHA가 있으면 추가 (기존 파일 업데이트)
                if (sha) {
                    requestBody.sha = sha;
                }

                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_NAME}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(requestBody)
                    }
                );

                if (response.ok) {
                    updateSyncStatus('✅ GitHub에 저장됨!', '#10b981');
                } else {
                    const error = await response.json();
                    throw new Error(error.message || '저장 실패');
                }
            } catch (error) {
                console.error('저장 오류:', error);
                updateSyncStatus(`❌ 저장 실패: ${error.message}`, '#E24B4A');
            }
        }

        // 샘플 데이터 생성
        function createSampleData() {
            projects = [
                { id: 1, name: '진사애', status: '결제완료', notes: '와루도 확인하고 패키지만 넘기면됨', deadline: '' },
                { id: 2, name: '설이', status: '결제완료', notes: '페이셜 컨펌-표정키, mmd 대응', deadline: '' },
                { id: 3, name: '호빵팔아요', status: '결제완료', notes: '주문만 주시고 문의 내용은 나중에 결정 후 보내주시기로 함', deadline: '' },
                { id: 4, name: '이도해', status: '결제완료', notes: '페이셜 하는중', deadline: '' },
                { id: 5, name: '이윤지', status: '결제완료', notes: '오마카세 패키지 시작도 안함', deadline: '' },
                { id: 6, name: '시루', status: '문의만', notes: '원화기반 성형할지 오리지널 할지 고민중 연락없음', deadline: '' },
                { id: 7, name: '하루라랄', status: '문의만', notes: '하리님 원화/9월 중반에 맡기기로', deadline: '2026-09-15' },
                { id: 8, name: '백월', status: '문의만', notes: '6월 30일에 맡기기로', deadline: '2026-06-30' },
            ];
        }

        // 동기화 상태 업데이트
        function updateSyncStatus(message, color) {
            const status = document.getElementById('syncStatus');
            status.textContent = message;
            status.style.color = color;
        }

        // 달력 렌더링
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthDisplay').textContent = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            ['일', '월', '화', '수', '목', '금', '토'].forEach(day => {
                const div = document.createElement('div');
                div.className = 'calendar-day-header';
                div.textContent = day;
                grid.appendChild(div);
            });

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.textContent = day;

                const hasDeadline = projects.some(p => {
                    if (!p.deadline) return false;
                    const d = new Date(p.deadline);
                    return d.getDate() === day && d.getMonth() === month && d.getFullYear() === year;
                });

                if (hasDeadline) {
                    div.classList.add('has-deadline');
                }

                div.onclick = () => showDateInfo(year, month, day);
                grid.appendChild(div);
            }
        }

        function showDateInfo(year, month, day) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const peopleWithDeadline = projects.filter(p => p.deadline === dateStr);

            const info = document.getElementById('selectedDateInfo');
            if (peopleWithDeadline.length > 0) {
                let html = `<h4>${year}년 ${month + 1}월 ${day}일</h4><div class="date-people">`;
                peopleWithDeadline.forEach(p => {
                    html += `<span class="person-tag">${p.name}</span>`;
                });
                html += '</div>';
                info.innerHTML = html;
                info.style.display = 'block';
            } else {
                info.style.display = 'none';
            }
        }

        function renderKanban() {
            const statuses = ['문의만', '결제완료', '진행중'];
            const section = document.getElementById('kanbanSection');
            section.innerHTML = '';

            statuses.forEach(status => {
                const filtered = projects.filter(p => p.status === status);
                
                const column = document.createElement('div');
                column.className = 'kanban-column';
                column.setAttribute('data-status', status);
                column.ondragover = (e) => dragOver(e);
                column.ondrop = (e) => drop(e, status);
                column.ondragleave = (e) => dragLeave(e);

                const header = document.createElement('div');
                header.className = `column-header ${status === '문의만' ? 'inquiry' : status === '결제완료' ? 'completed' : 'inprogress'}`;
                header.textContent = `${status} (${filtered.length})`;
                column.appendChild(header);

                filtered.forEach(project => {
                    const card = createProjectCard(project);
                    column.appendChild(card);
                });

                section.appendChild(column);
            });

            renderCompleted();
        }

        function createProjectCard(project) {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.draggable = true;
            card.setAttribute('data-id', project.id);
            card.ondragstart = (e) => dragStart(e, project.id);
            card.ondragend = (e) => dragEnd(e);
            card.onclick = () => openModal(project);

            let html = `<div class="project-name">${project.name}</div>`;
            if (project.notes) {
                html += `<div class="project-notes">${project.notes}</div>`;
            }
            if (project.deadline) {
                html += `<div class="project-deadline">📅 ${project.deadline}</div>`;
            }
            card.innerHTML = html;
            return card;
        }

        function renderCompleted() {
            const completed = projects.filter(p => p.status === '작업완료');
            document.getElementById('completedCount').textContent = `작업완료 (${completed.length})`;

            const list = document.getElementById('completedList');
            list.innerHTML = '';
            
            list.ondragover = (e) => dragOver(e);
            list.ondrop = (e) => dropToCompleted(e);
            list.ondragleave = (e) => dragLeaveCompleted(e);

            completed.forEach(project => {
                const card = document.createElement('div');
                card.className = 'completed-card';
                card.draggable = true;
                card.setAttribute('data-id', project.id);
                card.ondragstart = (e) => dragStart(e, project.id);
                card.ondragend = (e) => dragEnd(e);
                card.onclick = () => openModal(project);
                card.title = project.name; // 호버 시 전체 이름 표시
                card.textContent = project.name;
                list.appendChild(card);
            });
        }

        function toggleCompleted() {
            completedOpen = !completedOpen;
            document.getElementById('completedList').classList.toggle('show');
            document.getElementById('toggleIcon').classList.toggle('open');
        }

        let draggedId = null;
        function dragStart(e, id) {
            draggedId = id;
            const card = e.target.closest('.project-card');
            card.classList.add('dragging');
        }

        function dragEnd(e) {
            const card = e.target.closest('.project-card');
            card.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(col => {
                col.classList.remove('drag-over');
            });
        }

        function dragOver(e) {
            e.preventDefault();
            const column = e.target.closest('.kanban-column');
            if (column) {
                column.classList.add('drag-over');
            }
        }

        function dragLeave(e) {
            const column = e.target.closest('.kanban-column');
            if (column) {
                column.classList.remove('drag-over');
            }
        }

        function drop(e, status) {
            e.preventDefault();
            const column = e.target.closest('.kanban-column');
            if (column) {
                column.classList.remove('drag-over');
            }

            if (draggedId) {
                const project = projects.find(p => p.id === draggedId);
                if (project) {
                    project.status = status;
                    renderKanban();
                }
            }
        }

        function dropToCompleted(e) {
            e.preventDefault();
            const list = document.getElementById('completedList');
            list.classList.remove('drag-over');

            if (draggedId) {
                const project = projects.find(p => p.id === draggedId);
                if (project) {
                    project.status = '작업완료';
                    renderKanban();
                }
            }
        }

        function dragLeaveCompleted(e) {
            const list = document.getElementById('completedList');
            if (e.target === list || !list.contains(e.relatedTarget)) {
                list.classList.remove('drag-over');
            }
        }

        function openModal(project = null) {
            const modal = document.getElementById('modalOverlay');
            const deleteBtn = document.getElementById('deleteBtn');

            if (project) {
                editingId = project.id;
                document.getElementById('modalTitle').textContent = '프로젝트 수정';
                document.getElementById('inputName').value = project.name;
                document.getElementById('inputStatus').value = project.status;
                document.getElementById('inputNotes').value = project.notes;
                document.getElementById('inputDeadline').value = project.deadline;
                deleteBtn.style.display = 'block';
            } else {
                editingId = null;
                document.getElementById('modalTitle').textContent = '새 프로젝트 추가';
                document.getElementById('inputName').value = '';
                document.getElementById('inputStatus').value = '문의만';
                document.getElementById('inputNotes').value = '';
                document.getElementById('inputDeadline').value = '';
                deleteBtn.style.display = 'none';
            }

            modal.classList.add('show');
        }

        function closeModal(event) {
            if (event && event.target.id !== 'modalOverlay') return;
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function openSettings(event) {
            if (event && event.target.id !== 'settingsOverlay') return;
            document.getElementById('settingsOverlay').classList.add('show');
            document.getElementById('tokenInput').value = localStorage.getItem('githubToken') || '';
        }

        function closeSettings(event) {
            if (event && event.target.id !== 'settingsOverlay') return;
            document.getElementById('settingsOverlay').classList.remove('show');
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                alert('토큰을 입력해주세요!');
                return;
            }
            localStorage.setItem('githubToken', token);
            alert('토큰이 저장되었습니다!');
            closeSettings();
        }

        function saveProject() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) {
                alert('이름을 입력하세요');
                return;
            }

            const projectData = {
                name: name,
                status: document.getElementById('inputStatus').value,
                notes: document.getElementById('inputNotes').value,
                deadline: document.getElementById('inputDeadline').value
            };

            if (editingId) {
                const index = projects.findIndex(p => p.id === editingId);
                projects[index] = { ...projects[index], ...projectData };
            } else {
                projects.push({ id: Date.now(), ...projectData });
            }

            renderCalendar();
            renderKanban();
            closeModal();
        }

        function deleteProject() {
            if (confirm('정말 삭제하시겠습니까?')) {
                const deletingProject = projects.find(p => p.id === editingId);
                projects = projects.filter(p => p.id !== editingId);
                
                renderCalendar();
                renderKanban();
                closeModal();
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // 앱 시작
        init();
    </script>
</body>
</html>
