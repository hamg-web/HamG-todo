<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>햄쥐 작업 목록</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: #F5F1E6;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 2rem;
            color: #3E2723;
            font-size: 28px;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            align-items: start;
        }
        .calendar-card {
            background: white;
            border: 1px solid #E8E3DB;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px rgba(62, 39, 35, 0.08);
            display: flex;
            flex-direction: column;
        }
        .calendar-content {
            flex: 1;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .calendar-header button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #F4C9D6;
            padding: 4px 8px;
            font-weight: bold;
        }
        .calendar-header button:hover {
            color: #F9A8BB;
        }
        .calendar-month {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #3E2723;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            font-size: 11px;
            margin-bottom: 1.5rem;
        }
        .calendar-day-header {
            text-align: center;
            color: #999;
            font-weight: 500;
            padding: 4px 0;
        }
        .calendar-day {
            position: relative;
            min-height: 45px;
            border: 1px solid #E8E3DB;
            border-radius: 4px;
            padding: 3px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .calendar-day:hover {
            border-color: #F4C9D6;
            box-shadow: 0 2px 6px rgba(244, 201, 214, 0.2);
        }
        .calendar-day-number {
            font-weight: 600;
            color: #3E2723;
            margin-bottom: 2px;
            font-size: 12px;
        }
        .calendar-day-projects {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0px;
            overflow: hidden;
        }
        .calendar-day-project {
            flex: 1;
            min-height: 5px;
            border-radius: 2px;
            opacity: 0.85;
            cursor: pointer;
            font-size: 0;
            padding: 0;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .selected-date-info {
            background: #F5F1E6;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }
        .selected-date-info h4 {
            font-size: 12px;
            color: #3E2723;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .date-people {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        .date-people .person-tag {
            display: inline-block;
            background: #F4C9D6;
            color: #3E2723;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .calendar-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E8E3DB;
        }
        .calendar-buttons button {
            padding: 0.75rem 1rem;
            background: #F4C9D6;
            color: #3E2723;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
        }
        .calendar-buttons button:hover {
            background: #F9A8BB;
        }
        .calendar-buttons .settings-button {
            background: #E8E3DB;
        }
        .calendar-buttons .settings-button:hover {
            background: #D4CFC4;
        }
        .sync-status {
            margin-top: 0.75rem;
            font-size: 12px;
            color: #F9A8BB;
            text-align: center;
        }
        .tag-manager {
            background: #F5F1E6;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            display: none;
        }
        .tag-manager.show {
            display: block;
        }
        .tag-manager h4 {
            font-size: 12px;
            font-weight: 600;
            color: #3E2723;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }
        .tag-input-group {
            display: flex;
            gap: 6px;
            margin-bottom: 0.75rem;
        }
        .tag-input-group input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #E8E3DB;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag-input-group button {
            padding: 6px 12px;
            background: #F4C9D6;
            color: #3E2723;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
        }
        .tag-input-group button:hover {
            background: #F9A8BB;
        }
        .global-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .global-tag {
            background: white;
            border: 1px solid #E8E3DB;
            color: #3E2723;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .global-tag button {
            background: none;
            border: none;
            color: #E24B4A;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            line-height: 1;
        }
        .global-tag button:hover {
            color: #B83A38;
        }
        .kanban-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        .kanban-column {
            background: white;
            border: 1px solid #E8E3DB;
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 500px;
            box-shadow: 0 1px 3px rgba(62, 39, 35, 0.08);
        }
        .column-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid;
            color: #3E2723;
        }
        .column-header.inquiry {
            border-color: #F4C9D6;
            color: #F9A8BB;
        }
        .column-header.completed {
            border-color: #F9A8BB;
            color: #F9A8BB;
        }
        .column-header.inprogress {
            border-color: #F4C9D6;
            color: #F4C9D6;
        }
        .project-card {
            background: #FAFAF8;
            border: 1px solid #E8E3DB;
            border-radius: 8px;
            padding: 0.875rem;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.2s;
            draggable: true;
        }
        .project-card:active {
            cursor: grabbing;
        }
        .project-card:hover {
            border-color: #F4C9D6;
            box-shadow: 0 2px 6px rgba(244, 201, 214, 0.2);
            background: white;
        }
        .project-card.dragging {
            opacity: 0.5;
        }
        .project-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #3E2723;
        }
        .project-details {
            font-size: 11px;
            color: #666;
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .project-details-item {
            margin-bottom: 4px;
        }
        .project-notes {
            font-size: 11px;
            color: #999;
            margin-bottom: 6px;
            line-height: 1.4;
            background: #F5F1E6;
            padding: 4px 6px;
            border-radius: 4px;
        }
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tag {
            background: #F4C9D6;
            color: #3E2723;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
        }
        .project-color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            margin-top: 4px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .completed-section {
            margin-top: 2rem;
            background: white;
            border: 1px solid #E8E3DB;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(62, 39, 35, 0.08);
        }
        .completed-header {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: background 0.2s;
        }
        .completed-header:hover {
            background: #F5F1E6;
        }
        .completed-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: #F9A8BB;
            margin: 0;
            flex: 1;
        }
        .toggle-icon {
            display: inline-block;
            transition: transform 0.2s;
            color: #F4C9D6;
        }
        .toggle-icon.open {
            transform: rotate(180deg);
        }
        .completed-list.show {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            padding: 1.5rem;
        }
        .completed-card {
            background: #FAFAF8;
            border: 1px solid #E8E3DB;
            border-radius: 8px;
            padding: 12px;
            cursor: grab;
            text-align: center;
            transition: all 0.2s;
            font-weight: 600;
            color: #3E2723;
            font-size: 13px;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            draggable: true;
        }
        .completed-card:hover {
            border-color: #F4C9D6;
            background: white;
            box-shadow: 0 2px 6px rgba(244, 201, 214, 0.2);
        }
        .completed-card.dragging {
            opacity: 0.5;
        }
        .completed-list {
            display: none;
            border-top: 1px solid #E8E3DB;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(62, 39, 35, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 25px rgba(62, 39, 35, 0.2);
            margin: auto;
        }
        .modal h3 {
            margin-bottom: 1.5rem;
            font-size: 18px;
            color: #3E2723;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #3E2723;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #E8E3DB;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #FAFAF8;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #F4C9D6;
            background: white;
            box-shadow: 0 0 0 3px rgba(244, 201, 214, 0.2);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .color-picker-group {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .color-picker-group input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }
        .color-picker-group button {
            padding: 8px 12px;
            background: #F4C9D6;
            color: #3E2723;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .color-picker-group button:hover {
            background: #F9A8BB;
        }
        .tag-selector {
            background: #F5F1E6;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .tag-selector label {
            font-size: 12px;
            font-weight: 600;
            color: #3E2723;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.75rem;
        }
        .tag-checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-checkbox {
            display: inline-block;
            background: transparent;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #E8E3DB;
            transition: all 0.2s;
            font-size: 12px;
            font-weight: 500;
            color: #3E2723;
        }
        .tag-checkbox:hover {
            border-color: #F4C9D6;
        }
        .tag-checkbox.selected {
            background: #FFD1DC;
            border-color: #FFD1DC;
            color: #3E2723;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        .modal-buttons button {
            padding: 10px 16px;
            border: 1px solid #E8E3DB;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background: white;
            color: #3E2723;
            transition: all 0.2s;
        }
        .modal-buttons button:hover {
            background: #F5F1E6;
        }
        .modal-buttons .delete-btn {
            background: #F4C9D6;
            color: #3E2723;
            border-color: #F4C9D6;
            margin-right: auto;
        }
        .modal-buttons .delete-btn:hover {
            background: #F9A8BB;
        }
        .modal-buttons .save-btn {
            background: #F4C9D6;
            color: #3E2723;
            border-color: #F4C9D6;
        }
        .modal-buttons .save-btn:hover {
            background: #F9A8BB;
        }
        .kanban-column.drag-over {
            background: #F5F1E6;
            border-color: #F4C9D6;
        }
        .backup-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #E8E3DB;
        }
        .backup-buttons button {
            padding: 0.65rem 0.8rem;
            background: #E8E3DB;
            color: #3E2723;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .backup-buttons button:hover {
            background: #D4CFC4;
        }
        #importFile {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>햄쥐 작업 목록</h1>
        
        <div class="main-grid">
            <!-- 달력 -->
            <div class="calendar-card">
                <div class="calendar-content">
                    <div class="calendar-header">
                        <button onclick="prevMonth()">◀</button>
                        <span class="calendar-month" id="monthDisplay"></span>
                        <button onclick="nextMonth()">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                    <div class="selected-date-info" id="selectedDateInfo" style="display: none;"></div>
                </div>
                <div class="calendar-buttons">
                    <button class="add-button" onclick="openModal()">+ 새 프로젝트</button>
                    <button class="save-button" onclick="saveToGitHub()">💾 GitHub 동기</button>
                    <button class="settings-button" onclick="openSettings()">⚙️ 설정</button>
                    <button class="add-button" onclick="toggleTagManager()" style="background: #F9A8BB;">✏️ 작업 내용 추가</button>
                </div>
                <div class="sync-status" id="syncStatus">💾 자동 저장 중...</div>
                
                <!-- 칩 관리 섹션 -->
                <div class="tag-manager" id="tagManager">
                    <h4>작업 내용 관리</h4>
                    <div class="tag-input-group">
                        <input type="text" id="newTagInput" placeholder="새 작업..." onkeypress="if(event.key==='Enter') addGlobalTag()">
                        <button onclick="addGlobalTag()">추가</button>
                    </div>
                    <div class="global-tags" id="globalTagsList"></div>
                </div>

                <!-- 백업 섹션 -->
                <div class="backup-buttons">
                    <button onclick="exportData()">📤 내보내기</button>
                    <button onclick="document.getElementById('importFile').click()">📥 가져오기</button>
                </div>
                <input type="file" id="importFile" accept=".json" onchange="importData(event)">
            </div>

            <!-- 칸반보드 -->
            <div>
                <div class="kanban-section" id="kanbanSection"></div>
                
                <!-- 작업 완료 -->
                <div class="completed-section">
                    <div class="completed-header" onclick="toggleCompleted()">
                        <span class="toggle-icon" id="toggleIcon">▼</span>
                        <h3 id="completedCount">작업완료 (0)</h3>
                    </div>
                    <div class="completed-list" id="completedList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 프로젝트 수정 모달 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="modalTitle">새 프로젝트 추가</h3>
            
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="inputName" placeholder="사람 이름을 입력하세요">
            </div>

            <div class="form-group">
                <label>상태</label>
                <select id="inputStatus">
                    <option>문의만</option>
                    <option>결제완료</option>
                    <option>진행중</option>
                    <option>작업완료</option>
                </select>
            </div>

            <div class="form-group">
                <label>금액</label>
                <input type="text" id="inputPrice" placeholder="0" onkeyup="formatPrice(this)">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>시작 날짜</label>
                    <input type="date" id="inputStartDate">
                </div>
                <div class="form-group">
                    <label>마감 날짜</label>
                    <input type="date" id="inputDeadline">
                </div>
            </div>

            <div class="form-group">
                <label>색상</label>
                <div class="color-picker-group">
                    <input type="color" id="inputColor" value="#FFB3D9">
                    <button onclick="setRandomColor()">🎲 랜덤</button>
                </div>
            </div>

            <div class="form-group">
                <label>메모</label>
                <textarea id="inputNotes" placeholder="진행 상황, 특별 요청사항 등을 입력하세요"></textarea>
            </div>

            <!-- 칩 선택 섹션 -->
            <div class="tag-selector" id="tagSelectorSection">
                <label>작업 내용 선택</label>
                <div class="tag-checkbox-group" id="tagCheckboxGroup"></div>
            </div>

            <div class="modal-buttons">
                <button class="delete-btn" id="deleteBtn" onclick="deleteProject()" style="display:none;">삭제</button>
                <button onclick="closeModal()">취소</button>
                <button class="save-btn" onclick="saveProject()">저장</button>
            </div>
        </div>
    </div>

    <!-- 설정 모달 -->
    <div class="modal-overlay" id="settingsOverlay" onclick="closeSettings(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>GitHub 설정</h3>
            
            <div class="form-group">
                <label>GitHub Personal Access Token (선택사항)</label>
                <input type="password" id="tokenInput" placeholder="ghp_로 시작하는 토큰 입력">
                <small style="color: #999; margin-top: 4px; display: block;">⚠️ 없어도 괜찮습니다. 로컬에만 저장됩니다.</small>
            </div>

            <div class="modal-buttons">
                <button onclick="closeSettings()">취소</button>
                <button class="save-btn" onclick="saveToken()">저장</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'hamg-web';
        const GITHUB_REPO = 'HamG-todo';
        const FILE_NAME = 'projects.json';

        const pastelColors = [
            '#FFB3D9', '#FFD1DC', '#FFDAB9', '#FFE4C4',
            '#FFFACD', '#FFFFE0', '#E0FFE0', '#B0F0D6',
            '#B4E7FF', '#D4CFFF', '#E6D4FF', '#FFC0E3',
            '#FFEFD5', '#FFE4E1', '#E0F8F7', '#F5E6FF'
        ];

        let projects = [];
        let tagsLibrary = [];
        let currentDate = new Date();
        let editingId = null;
        let completedOpen = false;
        let selectedTags = [];
        let currentColor = '#FFB3D9';

        // 초기화
        function init() {
            loadData();
            initOrder();
            renderCalendar();
            renderKanban();
            renderGlobalTags();
            autoSave();
        }

        // 데이터 로드
        function loadData() {
            // 1. localStorage에서 먼저 확인
            const saved = localStorage.getItem('hamgTodoData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    projects = data.projects || [];
                    tagsLibrary = data.tagsLibrary || [];
                    updateSyncStatus('💾 로컬 저장소에서 로드됨', '#10b981');
                    return;
                } catch (e) {
                    console.log('localStorage 로드 실패:', e);
                }
            }

            // 2. 없으면 샘플 데이터 생성
            createSampleData();
            updateSyncStatus('✨ 샘플 데이터 생성됨', '#F9A8BB');
        }

        // 자동 저장
        function autoSave() {
            const data = {
                projects: projects,
                tagsLibrary: tagsLibrary
            };
            localStorage.setItem('hamgTodoData', JSON.stringify(data));
            updateSyncStatus('💾 자동 저장됨', '#10b981');
        }

        // GitHub 저장 (선택사항)
        async function saveToGitHub() {
            const token = localStorage.getItem('githubToken');
            
            if (!token) {
                alert('GitHub 토큰을 설정해주세요!\n(설정 → 토큰 입력)');
                openSettings();
                return;
            }

            try {
                updateSyncStatus('⏳ GitHub 동기화 중...', '#F4C9D6');

                let sha = null;
                
                try {
                    const checkResponse = await fetch(
                        `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_NAME}`,
                        { 
                            headers: { 
                                'Authorization': `token ${token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            } 
                        }
                    );
                    
                    if (checkResponse.ok) {
                        const fileData = await checkResponse.json();
                        sha = fileData.sha;
                    }
                } catch (e) {
                    console.log('파일 확인:', e);
                }

                const saveData = {
                    projects: projects,
                    tagsLibrary: tagsLibrary
                };

                const projectsJson = JSON.stringify(saveData, null, 2);
                const base64 = btoa(unescape(encodeURIComponent(projectsJson)));
                
                const requestBody = {
                    message: `Update projects - ${new Date().toLocaleString('ko-KR')}`,
                    content: base64
                };

                if (sha) {
                    requestBody.sha = sha;
                }

                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_NAME}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify(requestBody)
                    }
                );

                if (response.ok) {
                    updateSyncStatus('✅ GitHub 동기화 완료!', '#10b981');
                } else {
                    updateSyncStatus('⚠️ GitHub 동기화 실패 (로컬은 저장됨)', '#F9A8BB');
                }
            } catch (error) {
                console.error('GitHub 저장 오류:', error);
                updateSyncStatus('⚠️ GitHub 동기화 실패 (로컬은 저장됨)', '#F9A8BB');
            }
        }

        // 내보내기
        function exportData() {
            const data = {
                projects: projects,
                tagsLibrary: tagsLibrary
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hamg-todo-${new Date().getTime()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 가져오기
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    projects = data.projects || [];
                    tagsLibrary = data.tagsLibrary || [];
                    
                    autoSave();
                    renderCalendar();
                    renderKanban();
                    renderGlobalTags();
                    
                    alert('✅ 데이터를 불러왔습니다!');
                } catch (error) {
                    alert('❌ 파일 형식이 잘못되었습니다.');
                    console.error('Import error:', error);
                }
            };
            reader.readAsText(file);
            
            // 파일 입력 초기화
            event.target.value = '';
        }

        // 샘플 데이터
        function createSampleData() {
            projects = [
                { id: 1, name: '진사애', status: '결제완료', notes: '와루도 확인하고 패키지만 넘기면됨', price: 0, startDate: '2026-06-15', deadline: '2026-07-15', tags: [], projectColor: getRandomPastelColor(), order: 0 },
                { id: 2, name: '설이', status: '결제완료', notes: '페이셜 컨펌-표정키, mmd 대응', price: 0, startDate: '2026-06-20', deadline: '2026-08-20', tags: [], projectColor: getRandomPastelColor(), order: 1 },
                { id: 3, name: '호빵팔아요', status: '결제완료', notes: '', price: 0, startDate: '', deadline: '', tags: [], projectColor: getRandomPastelColor(), order: 2 },
                { id: 4, name: '이도해', status: '결제완료', notes: '페이셜 하는중', price: 0, startDate: '2026-06-25', deadline: '2026-07-25', tags: [], projectColor: getRandomPastelColor(), order: 3 },
                { id: 5, name: '이윤지', status: '결제완료', notes: '오마카세 패키지 시작도 안함', price: 0, startDate: '', deadline: '', tags: [], projectColor: getRandomPastelColor(), order: 4 },
                { id: 6, name: '시루', status: '문의만', notes: '원화기반 성형할지 오리지널 할지 고민중', price: 0, startDate: '', deadline: '', tags: [], projectColor: getRandomPastelColor(), order: 0 },
                { id: 7, name: '하루라랄', status: '문의만', notes: '9월 중반에 맡기기로', price: 0, startDate: '2026-08-01', deadline: '2026-09-15', tags: [], projectColor: getRandomPastelColor(), order: 1 },
                { id: 8, name: '백월', status: '문의만', notes: '6월 30일에 맡기기로', price: 0, startDate: '2026-06-20', deadline: '2026-06-30', tags: [], projectColor: getRandomPastelColor(), order: 2 },
            ];
            tagsLibrary = [];
        }

        // 파스텔 색상
        function getRandomPastelColor() {
            return pastelColors[Math.floor(Math.random() * pastelColors.length)];
        }

        function setRandomColor() {
            currentColor = getRandomPastelColor();
            document.getElementById('inputColor').value = currentColor;
        }

        // Order 초기화
        function initOrder() {
            projects.forEach((p, idx) => {
                if (p.order === undefined) {
                    p.order = idx;
                }
            });
        }

        // 칩 관리
        function toggleTagManager() {
            document.getElementById('tagManager').classList.toggle('show');
        }

        function addGlobalTag() {
            const input = document.getElementById('newTagInput');
            const tagText = input.value.trim();
            
            if (!tagText) {
                alert('작업 내용을 입력해주세요');
                return;
            }

            if (tagsLibrary.includes(tagText)) {
                alert('이미 존재합니다');
                return;
            }

            tagsLibrary.push(tagText);
            input.value = '';
            renderGlobalTags();
            autoSave();
        }

        function removeGlobalTag(tag) {
            tagsLibrary = tagsLibrary.filter(t => t !== tag);
            projects.forEach(p => {
                p.tags = p.tags.filter(t => t !== tag);
            });
            renderGlobalTags();
            renderKanban();
            autoSave();
        }

        function renderGlobalTags() {
            const list = document.getElementById('globalTagsList');
            list.innerHTML = '';
            
            tagsLibrary.forEach(tag => {
                const item = document.createElement('div');
                item.className = 'global-tag';
                item.innerHTML = `
                    <span>${tag}</span>
                    <button onclick="removeGlobalTag('${tag}')">×</button>
                `;
                list.appendChild(item);
            });
        }

        function renderTagCheckboxes() {
            const group = document.getElementById('tagCheckboxGroup');
            group.innerHTML = '';
            
            tagsLibrary.forEach(tag => {
                const isSelected = selectedTags.includes(tag);
                const checkbox = document.createElement('div');
                checkbox.className = `tag-checkbox ${isSelected ? 'selected' : ''}`;
                checkbox.textContent = tag;
                checkbox.onclick = () => {
                    toggleTagSelection(tag);
                    checkbox.classList.toggle('selected');
                };
                group.appendChild(checkbox);
            });
        }

        function toggleTagSelection(tag) {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
            } else {
                selectedTags.push(tag);
            }
        }

        // 동기화 상태
        function updateSyncStatus(message, color) {
            const status = document.getElementById('syncStatus');
            status.textContent = message;
            status.style.color = color;
        }

        // 달력 렌더링
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthDisplay').textContent = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            ['일', '월', '화', '수', '목', '금', '토'].forEach(day => {
                const div = document.createElement('div');
                div.className = 'calendar-day-header';
                div.textContent = day;
                grid.appendChild(div);
            });

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayProjects = getProjectsForDate(dateStr);

                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.onclick = () => showDateInfo(dateStr, dayProjects);

                const dayNumber = document.createElement('div');
                dayNumber.className = 'calendar-day-number';
                dayNumber.textContent = day;
                div.appendChild(dayNumber);

                if (dayProjects.length > 0) {
                    const projectsContainer = document.createElement('div');
                    projectsContainer.className = 'calendar-day-projects';

                    dayProjects.forEach(project => {
                        const projectBox = document.createElement('div');
                        projectBox.className = 'calendar-day-project';
                        projectBox.style.backgroundColor = project.projectColor;
                        projectBox.textContent = project.name;
                        projectBox.title = project.name;
                        projectsContainer.appendChild(projectBox);
                    });

                    div.appendChild(projectsContainer);
                }

                grid.appendChild(div);
            }
        }

        function getProjectsForDate(dateStr) {
            return projects.filter(p => {
                if (!p.startDate || !p.deadline) return false;
                return dateStr >= p.startDate && dateStr <= p.deadline;
            });
        }

        function showDateInfo(dateStr, dayProjects) {
            const info = document.getElementById('selectedDateInfo');
            
            if (dayProjects.length > 0) {
                const [year, month, day] = dateStr.split('-');
                let html = `<h4>${parseInt(year)}년 ${parseInt(month)}월 ${parseInt(day)}일</h4><div class="date-people">`;
                dayProjects.forEach(p => {
                    html += `<span class="person-tag" style="background: ${p.projectColor}; color: #3E2723;">${p.name}</span>`;
                });
                html += '</div>';
                info.innerHTML = html;
                info.style.display = 'block';
            } else {
                info.style.display = 'none';
            }
        }

        // 가격 포맷팅
        function formatPrice(input) {
            let value = input.value.replace(/[^\d]/g, '');
            if (value) {
                value = parseInt(value).toLocaleString();
            }
            input.value = value;
        }

        // 칸반
        function renderKanban() {
            const statuses = ['문의만', '결제완료', '진행중'];
            const section = document.getElementById('kanbanSection');
            section.innerHTML = '';

            statuses.forEach(status => {
                const filtered = projects
                    .filter(p => p.status === status)
                    .sort((a, b) => {
                        const aOrder = a.order !== undefined ? a.order : projects.indexOf(a);
                        const bOrder = b.order !== undefined ? b.order : projects.indexOf(b);
                        return aOrder - bOrder;
                    });
                
                const column = document.createElement('div');
                column.className = 'kanban-column';
                column.setAttribute('data-status', status);
                column.ondragover = (e) => dragOver(e);
                column.ondrop = (e) => drop(e, status);
                column.ondragleave = (e) => dragLeave(e);

                const header = document.createElement('div');
                header.className = `column-header ${status === '문의만' ? 'inquiry' : status === '결제완료' ? 'completed' : 'inprogress'}`;
                header.textContent = `${status} (${filtered.length})`;
                column.appendChild(header);

                filtered.forEach(project => {
                    const card = createProjectCard(project);
                    column.appendChild(card);
                });

                section.appendChild(column);
            });

            renderCompleted();
        }

        function createProjectCard(project) {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.draggable = true;
            card.setAttribute('data-id', project.id);
            card.ondragstart = (e) => dragStart(e, project.id);
            card.ondragend = (e) => dragEnd(e);
            card.onclick = () => openModal(project);

            let html = `<div class="project-name">${project.name}</div>`;
            
            html += `<div class="project-details">`;
            if (project.price) html += `<div class="project-details-item">💰 ${project.price.toLocaleString()}원</div>`;
            if (project.startDate || project.deadline) {
                let dateStr = '';
                if (project.startDate) dateStr += project.startDate;
                if (project.startDate && project.deadline) dateStr += ' ~ ';
                if (project.deadline) dateStr += project.deadline;
                html += `<div class="project-details-item">📅 ${dateStr}</div>`;
            }
            html += `</div>`;

            if (project.notes) {
                html += `<div class="project-notes">${project.notes}</div>`;
            }

            if (project.tags && project.tags.length > 0) {
                html += `<div class="project-tags">`;
                project.tags.forEach(tag => {
                    html += `<span class="tag">${tag}</span>`;
                });
                html += `</div>`;
            }

            if (project.projectColor) {
                html += `<div class="project-color-indicator" style="background: ${project.projectColor};"></div>`;
            }

            card.innerHTML = html;
            return card;
        }

        function renderCompleted() {
            const completed = projects.filter(p => p.status === '작업완료');
            document.getElementById('completedCount').textContent = `작업완료 (${completed.length})`;

            const list = document.getElementById('completedList');
            list.innerHTML = '';
            
            list.ondragover = (e) => dragOver(e);
            list.ondrop = (e) => dropToCompleted(e);
            list.ondragleave = (e) => dragLeaveCompleted(e);

            completed.forEach(project => {
                const card = document.createElement('div');
                card.className = 'completed-card';
                card.draggable = true;
                card.setAttribute('data-id', project.id);
                card.ondragstart = (e) => dragStart(e, project.id);
                card.ondragend = (e) => dragEnd(e);
                card.onclick = () => openModal(project);
                card.title = project.name;
                card.textContent = project.name;
                list.appendChild(card);
            });
        }

        function toggleCompleted() {
            completedOpen = !completedOpen;
            document.getElementById('completedList').classList.toggle('show');
            document.getElementById('toggleIcon').classList.toggle('open');
        }

        // 드래그 앤 드롭
        let draggedId = null;
        function dragStart(e, id) {
            draggedId = id;
            const card = e.target.closest('.project-card, .completed-card');
            if (card) card.classList.add('dragging');
        }

        function dragEnd(e) {
            const card = e.target.closest('.project-card, .completed-card');
            if (card) card.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(col => {
                col.classList.remove('drag-over');
            });
        }

        function dragOver(e) {
            e.preventDefault();
            const column = e.target.closest('.kanban-column');
            if (column) column.classList.add('drag-over');
        }

        function dragLeave(e) {
            const column = e.target.closest('.kanban-column');
            if (column) column.classList.remove('drag-over');
        }

        function drop(e, status) {
            e.preventDefault();
            const column = e.target.closest('.kanban-column');
            if (column) column.classList.remove('drag-over');

            if (draggedId) {
                const draggedProject = projects.find(p => p.id === draggedId);
                if (!draggedProject) return;

                if (draggedProject.status === status) {
                    // 같은 상태 내에서 순서 변경
                    const dropCard = e.target.closest('.project-card');
                    if (dropCard) {
                        const targetId = parseInt(dropCard.getAttribute('data-id'));
                        const targetProject = projects.find(p => p.id === targetId);
                        
                        if (targetProject && draggedId !== targetId) {
                            const draggedOrder = draggedProject.order !== undefined ? draggedProject.order : projects.indexOf(draggedProject);
                            const targetOrder = targetProject.order !== undefined ? targetProject.order : projects.indexOf(targetProject);
                            
                            draggedProject.order = targetOrder;
                            targetProject.order = draggedOrder;
                        }
                    }
                } else {
                    // 다른 상태로 이동
                    draggedProject.status = status;
                }
                renderKanban();
                autoSave();
            }
        }

        function dropToCompleted(e) {
            e.preventDefault();
            const list = document.getElementById('completedList');
            list.classList.remove('drag-over');

            if (draggedId) {
                const project = projects.find(p => p.id === draggedId);
                if (project) {
                    project.status = '작업완료';
                    renderKanban();
                    autoSave();
                }
            }
        }

        function dragLeaveCompleted(e) {
            const list = document.getElementById('completedList');
            if (e.target === list || !list.contains(e.relatedTarget)) {
                list.classList.remove('drag-over');
            }
        }

        // 모달
        function openModal(project = null) {
            const modal = document.getElementById('modalOverlay');
            const deleteBtn = document.getElementById('deleteBtn');

            if (project) {
                editingId = project.id;
                document.getElementById('modalTitle').textContent = '프로젝트 수정';
                document.getElementById('inputName').value = project.name;
                document.getElementById('inputStatus').value = project.status;
                document.getElementById('inputPrice').value = project.price ? project.price.toLocaleString() : '0';
                document.getElementById('inputStartDate').value = project.startDate || '';
                document.getElementById('inputDeadline').value = project.deadline || '';
                document.getElementById('inputColor').value = project.projectColor || '#FFB3D9';
                document.getElementById('inputNotes').value = project.notes || '';
                currentColor = project.projectColor || '#FFB3D9';
                selectedTags = [...(project.tags || [])];
                deleteBtn.style.display = 'block';
            } else {
                editingId = null;
                const newColor = getRandomPastelColor();
                document.getElementById('modalTitle').textContent = '새 프로젝트 추가';
                document.getElementById('inputName').value = '';
                document.getElementById('inputStatus').value = '문의만';
                document.getElementById('inputPrice').value = '0';
                document.getElementById('inputStartDate').value = '';
                document.getElementById('inputDeadline').value = '';
                document.getElementById('inputColor').value = newColor;
                document.getElementById('inputNotes').value = '';
                currentColor = newColor;
                selectedTags = [];
                deleteBtn.style.display = 'none';
            }

            renderTagCheckboxes();
            modal.classList.add('show');
        }

        function closeModal(event) {
            if (event && event.target.id !== 'modalOverlay') return;
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function openSettings(event) {
            if (event && event.target.id !== 'settingsOverlay') return;
            document.getElementById('settingsOverlay').classList.add('show');
            document.getElementById('tokenInput').value = localStorage.getItem('githubToken') || '';
        }

        function closeSettings(event) {
            if (event && event.target.id !== 'settingsOverlay') return;
            document.getElementById('settingsOverlay').classList.remove('show');
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (token) {
                localStorage.setItem('githubToken', token);
                alert('토큰이 저장되었습니다!');
            } else {
                localStorage.removeItem('githubToken');
                alert('토큰이 제거되었습니다.');
            }
            closeSettings();
        }

        function saveProject() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) {
                alert('이름을 입력하세요');
                return;
            }

            const projectData = {
                name: name,
                status: document.getElementById('inputStatus').value,
                price: parseInt(document.getElementById('inputPrice').value.replace(/,/g, '')) || 0,
                startDate: document.getElementById('inputStartDate').value,
                notes: document.getElementById('inputNotes').value,
                deadline: document.getElementById('inputDeadline').value,
                tags: selectedTags,
                projectColor: document.getElementById('inputColor').value
            };

            if (editingId) {
                const index = projects.findIndex(p => p.id === editingId);
                projects[index] = { ...projects[index], ...projectData };
            } else {
                const newProject = { id: Date.now(), ...projectData };
                const sameStatus = projects.filter(p => p.status === projectData.status);
                newProject.order = sameStatus.length;
                projects.push(newProject);
            }

            renderCalendar();
            renderKanban();
            closeModal();
            autoSave();
        }

        function deleteProject() {
            if (confirm('정말 삭제하시겠습니까?')) {
                projects = projects.filter(p => p.id !== editingId);
                
                renderCalendar();
                renderKanban();
                closeModal();
                autoSave();
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // 앱 시작
        init();
    </script>
